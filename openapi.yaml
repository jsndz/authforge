openapi: 3.0.0
info:
  title: AuthForge API
  description: API documentation for the AuthForge authentication service.
  version: 1.0.0
servers:
  - url: http://localhost:8080/api/v1/auth
paths:
  /signup:
    post:
      summary: User Registration
      description: Register a new user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
              required:
                - email
                - password
      responses:
        '201':
          description: User registered successfully.
        '400':
          description: Invalid input.
  /login:
    post:
      summary: User Login
      description: Authenticate a user and return a token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
              required:
                - email
                - password
      responses:
        '200':
          description: Login successful.
        '401':
          description: Unauthorized.
  /email/verify:
    get:
      summary: Verify Email
      description: Verify a user's email address.
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Email verified successfully.
        '400':
          description: Invalid or expired token.